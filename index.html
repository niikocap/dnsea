<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Dragon Nest SEA Dungeon Finder</title>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<div class="container">
		<header class="header">
			<h1>Dragon Nest SEA</h1>
			<p>Dungeon Finder</p>
		</header>

		<!-- Search -->
		<div class="search-box">
			<input type="text" id="searchInput" placeholder="Search dungeon..." autocomplete="off">
			<div id="searchSuggestions" class="suggestions"></div>
		</div>

		<!-- Filters -->
		<div class="filters">
			<button class="filter-btn active" data-filter="all">All</button>
			<button class="filter-btn" data-filter="Nest">Nests</button>
			<button class="filter-btn" data-filter="Dungeon">Dungeons</button>
			<button class="filter-btn" data-filter="Town">Towns</button>
		</div>

		<!-- Result Count -->
		<div class="result-count"><span id="dungeonCount">0</span> dungeons</div>

		<!-- Dungeon List -->
		<div id="dungeonList" class="dungeon-list"></div>

		<!-- Detail Modal -->
		<div id="modal" class="modal">
			<div class="modal-content">
				<button class="modal-close" id="modalClose">&times;</button>
				<div class="modal-header">
					<h2 id="dungeonTitle">-</h2>
					<span class="badge" id="dungeonType">-</span>
				</div>
				<div class="modal-body">
					<div class="detail-row">
						<span class="label">Location</span>
						<span class="value" id="dungeonLocation">-</span>
					</div>
					<div class="detail-row">
						<span class="label">Gate</span>
						<span class="value" id="dungeonGate">-</span>
					</div>
					<div class="detail-row">
						<span class="label">Entrance</span>
						<span class="value" id="dungeonEntrance">-</span>
					</div>
					<div class="detail-row">
						<span class="label">Boss</span>
						<span class="value" id="dungeonBoss">-</span>
					</div>
					<div class="detail-row">
						<span class="label">Level</span>
						<span class="value" id="dungeonLevel">-</span>
					</div>
					<div class="detail-row">
						<span class="label">Party</span>
						<span class="value" id="dungeonParty">-</span>
					</div>
					<div class="detail-desc">
						<p id="dungeonDescription">-</p>
					</div>
					<div class="detail-keywords">
						<div id="dungeonKeywords"></div>
					</div>
				</div>
			</div>
		</div>
	</div>

	<script src="data.js"></script>
	<script src="script.js"></script>
</body>
</html>
